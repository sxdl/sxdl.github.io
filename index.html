<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sxdl</title>
<style>
:root {
    --bg: #FAFAFA; --surface: #FFF; --border: #EEE;
    --text: #1A1A2E; --text2: #6B7280; --text3: #C4C9D4;
    --accent: #6366F1; --accent-lt: #EEF2FF;
    --coral: #F97066; --sky: #38BDF8; --amber: #FBBF24;
    --emerald: #34D399; --violet: #A78BFA; --rose: #FB7185;
    --r: 16px; --r-sm: 10px; --r-full: 999px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans SC', sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
.wrap{max-width:720px;margin:0 auto;padding:0 20px}
.hero{padding:80px 0 48px;text-align:center}
.avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;background:linear-gradient(135deg,var(--violet),var(--sky));display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;font-weight:700;box-shadow:0 8px 24px rgba(99,102,241,.25)}
.hero h1{font-size:1.5rem;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.hero .tag{color:var(--text2);font-size:.88rem}
.search{max-width:380px;margin:0 auto 44px;position:relative}
.search input{width:100%;padding:11px 16px 11px 40px;border:1.5px solid var(--border);border-radius:var(--r-full);font-size:.88rem;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.search input::placeholder{color:var(--text3)}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.section{margin-bottom:32px}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:0 2px}
.section-head h2{font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.section-head .badge{font-size:.7rem;color:var(--text3);background:var(--bg);padding:2px 8px;border-radius:var(--r-full)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
@media(max-width:400px){.cards{grid-template-columns:1fr}}
.card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;position:relative}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(99,102,241,.15);border-color:var(--accent)}
.card-icon{width:40px;height:40px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-title{font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:.78rem;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-arrow{color:var(--text3);transition:transform .2s,color .2s;flex-shrink:0}
.card:hover .card-arrow{transform:translateX(3px);color:var(--accent)}
.card[data-color="coral"] .card-icon{background:#FFF1F0}
.card[data-color="coral"]:hover{border-color:var(--coral)}
.card[data-color="default"] .card-icon{background:var(--accent-lt)}
.footer{text-align:center;padding:48px 0 32px;color:var(--text3);font-size:.72rem}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="avatar">S</div>
    <h1>Hi, I'm sxdl</h1>
    <p class="tag">欢迎来到我的小站</p>
  </header>
  <div class="search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="搜索" autocomplete="off">
  </div>
  <main id="main"></main>
  <footer class="footer"></footer>
</div>
<script>
var ITEMS = [
  {name: "洛克王国种公查询", desc: "蛋组 · 属性 · 种公排行", icon: "🐉", color: "coral", url: "https://sxdl.site/Roco-Kingdom-StudMaster/"}
];

(function() {
  var main = document.getElementById("main");
  var html = '<section class="section"><div class="section-head"><span>🚀</span><h2>Projects</h2><span class="badge">' + ITEMS.length + '</span></div><div class="cards">';
  for (var i = 0; i < ITEMS.length; i++) {
    var it = ITEMS[i];
    html += '<a href="' + it.url + '" target="_blank" class="card" data-color="' + it.color + '">'
      + '<div class="card-icon">' + it.icon + '</div>'
      + '<div class="card-body"><div class="card-title">' + it.name + '</div><div class="card-desc">' + it.desc + '</div></div>'
      + '<div class="card-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>'
      + '</a>';
  }
  html += '</div></section>';
  main.innerHTML = html;

  document.querySelector(".search input").addEventListener("input", function(e) {
    var q = e.target.value.toLowerCase().trim();
    var cards = document.querySelectorAll(".card");
    for (var j = 0; j < cards.length; j++) {
      cards[j].style.display = (!q || cards[j].textContent.toLowerCase().indexOf(q) >= 0) ? "" : "none";
    }
    var sections = document.querySelectorAll(".section");
    for (var k = 0; k < sections.length; k++) {
      var vis = sections[k].querySelectorAll('.card:not([style*="display: none"])');
      sections[k].style.display = vis.length ? "" : "none";
    }
  });
})();
</script>
</body>
</html>
